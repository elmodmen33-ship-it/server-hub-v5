services:
  - type: web
    name: server-hub
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      cd backend && npm install
      cd ../frontend && npm install && npx vite build
    startCommand: cd backend && npx tsx src/index.ts
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
