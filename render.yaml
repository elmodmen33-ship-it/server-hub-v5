services:
  - type: web
    name: server-hub
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      cd backend && npm install --no-package-lock && npm run build
      cd ../frontend && npm install --no-package-lock && npm run build
    startCommand: sh -c "cd backend && npm start"
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: LANG
        value: en_US.UTF-8
      - key: LC_ALL
        value: en_US.UTF-8
